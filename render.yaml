services:
  - type: web
    name: youtube-summary-generator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: SUPADATA_API_KEY
        sync: false
